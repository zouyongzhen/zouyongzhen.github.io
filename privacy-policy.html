<style>
:root {
  --bg: #12111a;
  --bg-2: #1e1d2e;
  --surface: #2a2840;
  --ink: #f2ede4;
  --ink-soft: #c8c1b6;
  --gold: #c9a96e;
  --gold-2: #d8bc87;
  --line: rgba(201, 169, 110, 0.25);
  --radius: 20px;
  --max: 980px;
}
* {
  box-sizing: border-box;
}
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "Manrope", "Segoe UI", sans-serif;
  text-rendering: optimizeLegibility;
}
body {
  min-height: 100vh;
  background:
    radial-gradient(900px 500px at 10% -10%, rgba(201, 169, 110, 0.22), transparent 60%),
    radial-gradient(700px 400px at 100% 0%, rgba(232, 160, 191, 0.14), transparent 65%),
    linear-gradient(180deg, #0f0d17 0%, #12111a 100%);
}
a {
  color: var(--gold-2);
  text-decoration: underline;
  transition: color 0.2s ease;
}
a:hover {
  color: var(--gold);
  text-decoration: underline;
}
.wrap {
  width: min(var(--max), calc(100% - 32px));
  margin: 0 auto;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  backdrop-filter: blur(8px);
  background: rgba(18, 17, 26, 0.72);
  border-bottom: 1px solid rgba(201, 169, 110, 0.18);
}
.topbar-inner {
  min-height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
.brand {
  font-family: "Sora", "Manrope", sans-serif;
  font-weight: 800;
  letter-spacing: 0.01em;
  font-size: 1rem;
}
.nav {
  display: flex;
  gap: 16px;
  align-items: center;
}
.lang-wrap {
  position: relative;
}
.lang-btn {
  border: 1px solid rgba(201, 169, 110, 0.32);
  background: rgba(30, 29, 46, 0.8);
  color: #E8A0BF;
  font-size: 0.85rem;
  font-weight: 600;
  border-radius: 10px;
  padding: 7px 12px;
  cursor: pointer;
  min-width: 120px;
  text-align: center;
}
.lang-menu {
  position: absolute;
  right: 0;
  top: 44px;
  display: none;
  min-width: 180px;
  max-height: 300px;
  overflow-y: auto;
  background: #1a1927;
  border: 1px solid #35334a;
  border-radius: 10px;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
  padding: 6px;
  z-index: 30;
}
.lang-menu.show {
  display: block;
}
.lang-item {
  display: block;
  width: 100%;
  border: 0;
  background: transparent;
  color: #ddd;
  text-align: left;
  font-size: 0.85rem;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.lang-item:hover {
  background: #2a2840;
}
.lang-item.active {
  background: #2a2840;
  color: #E8A0BF;
  font-weight: 700;
}
.hero {
  padding: 48px 0 24px;
}
.eyebrow {
  margin: 0 0 10px;
  color: var(--gold-2);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-size: 0.72rem;
  font-weight: 800;
}
h1 {
  margin: 0;
  font-family: "Sora", "Manrope", sans-serif;
  font-size: clamp(1.9rem, 7vw, 2.8rem);
  line-height: 1.1;
}
.meta {
  margin: 16px 0 0;
  color: var(--ink-soft);
  font-size: 0.95rem;
  line-height: 1.65;
}
.toc-card {
  margin-top: 24px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(42, 40, 64, 0.42);
  padding: 20px;
}
.toc-title {
  margin: 0 0 12px;
  font-weight: 700;
  font-size: 0.95rem;
}
.toc {
  margin: 0;
  padding-left: 20px;
  line-height: 1.8;
  color: var(--ink-soft);
}
.section {
  margin-top: 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(30, 29, 46, 0.55);
  padding: 24px;
}
.section h2 {
  margin: 0 0 12px;

  font-size: 1.25rem;
  line-height: 1.3;
}
.section p {
  margin: 12px 0 0;
  color: var(--ink-soft);
  line-height: 1.72;
}
.section ul {
  margin: 12px 0 0;
  padding-left: 20px;
  color: var(--ink-soft);
  line-height: 1.8;
}
.section ul li {
  margin-top: 8px;
}
.section ul li:first-child {
  margin-top: 0;
}
.highlight {
  color: var(--gold-2);
  font-weight: 600;
}
footer {

  color: #9f96a9;
  font-size: 0.9rem;
  text-align: center;

  .topbar-inner {

  }
  .eyebrow {
    font-size: 0.68rem;
  }
  .meta {
    font-size: 0.88rem;
  }
}
.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}
.reveal.show {
  opacity: 1;
  transform: translateY(0);
}
.delay-1 { transition-delay: 0.1s; }

  }

    transform: none;
  }
}

TRANSLATIONS.en = {

  section1Content: '<p><span class="highlight">The App itself does not collect or upload any of your personal information.</span></p><p>How the App works:</p><ul><li><span class="highlight">Local Storage:</span> Language preferences and app settings are stored only on your device</li><li><span class="highlight">Local Gameplay:</span> All gameplay is local, game data (messages, drawings, etc.) is shared in real-time via local network and not uploaded anywhere</li><li><span class="highlight">Local Transfer:</span> Files are transferred directly between devices via local Wi-Fi</li></ul><p><span class="highlight">Third-Party Advertising:</span> The App integrates Google AdMob advertising services. Google may collect device information and advertising identifiers for personalized ads. See <a href="https://policies.google.com/privacy" target="_blank">Google Privacy Policy</a> for details.</p>',

  section2Content: '<p>The App itself does not collect or use your personal information.</p><p>App functionality:</p><ul><li>All game features run locally and do not upload user information or gameplay preferences</li><li>App settings are saved on your device to remember your preferences</li><li>Game data is only shared in real-time with players in the same room</li><li>File transfers occur directly between devices</li></ul><p><span class="highlight">Google Ads:</span> Google AdMob may use collected information to serve personalized ads and measure ad performance.</p>',

  section7Content: '<p>You have the following rights:</p><ul><li>Control app permissions through device settings</li><li>Stop using and uninstall the App at any time</li><li>Manage ad personalization options through device settings</li><li>Visit <a href="https://adssettings.google.com/" target="_blank">Google Ad Settings</a> to manage ad preferences</li></ul><p>Since the App does not collect your personal information, there is no need to provide data access, modification, or deletion services. All data is stored on your device and fully controlled by you.</p>',

function normalizeLang(lang) {
  var lower = (lang || "").toLowerCase().split("-")[0];
  if (lang && lang.toLowerCase().indexOf("zh-tw") === 0) return "zh-TW";
  if (lang && lang.toLowerCase().indexOf("zh-hk") === 0) return "zh-TW";
  return CODE_LOOKUP[lower] || "en";
}

function getLanguageName(code) {
  for (var i = 0; i < LANGUAGE_OPTIONS.length; i++) {
    if (LANGUAGE_OPTIONS[i].code === code) return LANGUAGE_OPTIONS[i].name;
  }
  return "English";
}

function saveLang(lang) {
  try {
    localStorage.setItem(STORAGE_KEY, lang);
  } catch (e) {}
}

function loadLang() {
  try {
    return localStorage.getItem(STORAGE_KEY);
  } catch (e) {
    return null;
  }
}

function getTranslation(lang) {
  return TRANSLATIONS[lang] || TRANSLATIONS.en;
}

function renderLanguageMenu(activeLang) {
  var html = "";
  LANGUAGE_OPTIONS.forEach(function(item) {
    var activeClass = item.code === activeLang ? " active" : "";
    html += '<button type="button" class="lang-item' + activeClass + '" data-lang="' + item.code + '">' + item.name + '</button>';
  });
  document.getElementById("langMenu").innerHTML = html;
  var items = document.querySelectorAll(".lang-item");
  for (var i = 0; i < items.length; i++) {
    items[i].addEventListener("click", function() {
      switchLanguage(this.getAttribute("data-lang"));
      document.getElementById("langMenu").classList.remove("show");
    });
  }
}

function renderContent(lang) {
  var t = getTranslation(lang);

  setTimeout(function() {
    var nodes = document.querySelectorAll(".reveal");
    if ("IntersectionObserver" in window) {
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("show");
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      nodes.forEach(function(el) { io.observe(el); });
    } else {
      nodes.forEach(function(el) { el.classList.add("show"); });
    }
  }, 50);
}

function switchLanguage(lang) {
  var normalized = normalizeLang(lang);
  saveLang(normalized);
  renderContent(normalized);
}

document.getElementById("langButton").addEventListener("click", function(event) {

  document.getElementById("langMenu").classList.toggle("show");
});

(function() {

  var queryLang = params.get("lang");
  var storedLang = loadLang();
  var browserLang = navigator.language || navigator.userLanguage || "en";
  var initialLang = normalizeLang(queryLang || storedLang || browserLang);
  if (queryLang) {
