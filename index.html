<style>
:root {
  --bg: #12111a;
  --bg-2: #1e1d2e;
  --surface: #2a2840;
  --ink: #f2ede4;
  --ink-soft: #c8c1b6;
  --gold: #c9a96e;
  --gold-2: #d8bc87;
  --pink: #E8A0BF;
  --line: rgba(201, 169, 110, 0.25);
  --shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
  --radius: 20px;
  --max: 1120px;
}
* {
  box-sizing: border-box;
}
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "Manrope", "Segoe UI", sans-serif;
  text-rendering: optimizeLegibility;
}
body {
  min-height: 100vh;
  background:
    radial-gradient(900px 500px at 10% -10%, rgba(201, 169, 110, 0.22), transparent 60%),
    radial-gradient(700px 400px at 100% 0%, rgba(232, 160, 191, 0.14), transparent 65%),
    linear-gradient(180deg, #0f0d17 0%, #12111a 100%);
}
a {
  color: inherit;
  text-decoration: none;
}
.wrap {
  width: min(var(--max), calc(100% - 32px));
  margin: 0 auto;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  backdrop-filter: blur(8px);
  background: rgba(18, 17, 26, 0.72);
  border-bottom: 1px solid rgba(201, 169, 110, 0.18);
}
.topbar-inner {
  min-height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
.brand {
  font-family: "Sora", "Manrope", sans-serif;
  font-weight: 800;
  letter-spacing: 0.01em;
  font-size: 1rem;
}
.nav {
  display: flex;
  gap: 16px;
  align-items: center;
  color: var(--ink-soft);
  font-size: 0.93rem;
}
.nav a {
  transition: color 0.2s ease;
}
.nav a:hover {
  color: var(--gold-2);
}
.lang-wrap {
  position: relative;
}
.lang-btn {
  border: 1px solid rgba(201, 169, 110, 0.32);
  background: rgba(30, 29, 46, 0.8);
  color: var(--pink);
  font-size: 0.85rem;
  font-weight: 600;
  border-radius: 10px;
  padding: 7px 12px;
  cursor: pointer;
  min-width: 120px;
  text-align: center;
}
.lang-menu {
  position: absolute;
  right: 0;
  top: 44px;
  display: none;
  min-width: 180px;
  max-height: 300px;
  overflow-y: auto;
  background: #1a1927;
  border: 1px solid #35334a;
  border-radius: 10px;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
  padding: 6px;
  z-index: 30;
}
.lang-menu.show {
  display: block;
}
.lang-item {
  display: block;
  width: 100%;
  border: 0;
  background: transparent;
  color: #ddd;
  text-align: left;
  font-size: 0.85rem;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.lang-item:hover {
  background: #2a2840;
}
.lang-item.active {
  background: #2a2840;
  color: var(--pink);
  font-weight: 700;
}
.hero {
  display: grid;
  gap: 26px;
  padding: 54px 0 20px;
  align-items: center;
}
.eyebrow {
  margin: 0 0 10px;
  color: var(--gold-2);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-size: 0.72rem;
  font-weight: 800;
}
h1 {
  margin: 0;
  font-family: "Sora", "Manrope", sans-serif;
  font-size: clamp(1.9rem, 7vw, 3.4rem);
  line-height: 1.05;
  max-width: 14ch;
}
.sub {
  margin: 16px 0 0;
  color: var(--ink-soft);
  font-size: clamp(1rem, 3.3vw, 1.15rem);
  line-height: 1.65;
  max-width: 60ch;
}
.cta-row {
  margin-top: 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.btn {
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 46px;
  padding: 0 18px;
  font-weight: 800;
  font-size: 0.95rem;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
  border: none;
}
.btn:active {
  transform: translateY(1px);
}
.btn-primary {
  background: linear-gradient(135deg, var(--gold), #b69055);
  color: #15131e;
  box-shadow: 0 8px 28px rgba(201, 169, 110, 0.3);
}
.btn-primary:hover {
  box-shadow: 0 12px 34px rgba(201, 169, 110, 0.38);
  transform: translateY(-1px);
}
.btn-ghost {
  border: 1px solid var(--line);
  color: var(--ink);
  background: rgba(255, 255, 255, 0.02);
}
.btn-ghost:hover {
  border-color: rgba(201, 169, 110, 0.5);
  color: var(--gold-2);
}
.hero-meta {
  margin: 18px 0 0;
  padding: 0;
  list-style: none;
  display: grid;
  gap: 8px;
  color: var(--ink-soft);
  font-size: 0.95rem;
}
.hero-meta li {
  position: relative;
  padding-left: 18px;
}
.hero-meta li::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0.5em;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gold);
  transform: translateY(-50%);
  box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.15);
}
.hero-preview {
  border: 1px solid var(--line);
  border-radius: calc(var(--radius) + 2px);
  background: linear-gradient(165deg, rgba(42, 40, 64, 0.9), rgba(30, 29, 46, 0.75));
  box-shadow: var(--shadow);
  padding: 18px;
  display: grid;
  gap: 10px;
}
.preview-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.chip {
  min-height: 72px;
  border-radius: 14px;
  border: 1px solid rgba(201, 169, 110, 0.2);
  padding: 12px;
  background: rgba(18, 17, 26, 0.35);
  display: grid;
  align-content: space-between;
  gap: 8px;
}
.chip b {
  font-family: "Sora", "Manrope", sans-serif;
  font-size: 0.9rem;
}
.chip span {
  color: var(--ink-soft);
  font-size: 0.82rem;
}
.section {
  padding: 56px 0 0;
}
.section h2 {
  margin: 0;
  font-family: "Sora", "Manrope", sans-serif;
  font-size: clamp(1.45rem, 5vw, 2.25rem);
  line-height: 1.2;
}
.section p.lead {
  margin: 12px 0 0;
  color: var(--ink-soft);
  max-width: 66ch;
  line-height: 1.65;
}
.feature-grid {
  margin-top: 24px;
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(1, minmax(0, 1fr));
}
.card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(42, 40, 64, 0.42);
  padding: 18px;
  min-height: 154px;
  display: grid;
  align-content: start;
  gap: 10px;
}
.card .tag {
  display: inline-flex;
  width: fit-content;
  border: 1px solid rgba(201, 169, 110, 0.4);
  border-radius: 999px;
  color: var(--gold-2);
  font-size: 0.74rem;
  padding: 4px 9px;
  letter-spacing: 0.03em;
  font-weight: 800;
  text-transform: uppercase;
}
.card h3 {
  margin: 0;
  font-family: "Sora", "Manrope", sans-serif;
  font-size: 1.12rem;
}
.card p {
  margin: 0;
  color: var(--ink-soft);
  line-height: 1.58;
  font-size: 0.95rem;
}
.steps {
  margin-top: 18px;
  display: grid;
  gap: 12px;
}
.step {
  border-radius: var(--radius);
  border: 1px solid rgba(201, 169, 110, 0.24);
  background: rgba(30, 29, 46, 0.64);
  padding: 16px;
  display: grid;
  gap: 6px;
}
.step-num {
  color: var(--gold-2);
  font-weight: 800;
  font-size: 0.84rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.step h4 {
  margin: 0;
  font-size: 1.05rem;
  font-family: "Sora", "Manrope", sans-serif;
}
.step p {
  margin: 0;
  color: var(--ink-soft);
  line-height: 1.6;
}
.lang-row {
  margin-top: 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.pill {
  border-radius: 999px;
  border: 1px solid rgba(201, 169, 110, 0.32);
  color: var(--ink-soft);
  padding: 7px 12px;
  font-size: 0.88rem;
  background: rgba(18, 17, 26, 0.32);
}
.banner {
  margin-top: 54px;
  border-radius: 22px;
  border: 1px solid rgba(201, 169, 110, 0.34);
  background:
    radial-gradient(560px 250px at 0% 0%, rgba(201, 169, 110, 0.22), transparent 70%),
    linear-gradient(145deg, rgba(42, 40, 64, 0.9), rgba(18, 17, 26, 0.86));
  padding: 24px;
  display: grid;
  gap: 14px;
  box-shadow: var(--shadow);
}
.banner h3 {
  margin: 0;
  font-family: "Sora", "Manrope", sans-serif;
  font-size: clamp(1.3rem, 4.4vw, 1.9rem);
  line-height: 1.2;
}
.banner p {
  margin: 0;
  color: var(--ink-soft);
  line-height: 1.6;
}
footer {
  padding: 24px 0 34px;
  color: #9f96a9;
  font-size: 0.9rem;
  text-align: center;
}
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.reveal.show {
  opacity: 1;
  transform: translateY(0);
}
.delay-1 { transition-delay: 0.08s; }
.delay-2 { transition-delay: 0.16s; }
.delay-3 { transition-delay: 0.24s; }
@media (min-width: 760px) {
  .feature-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .steps {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}
@media (min-width: 980px) {
  .hero {
    grid-template-columns: 1.1fr 0.9fr;
    gap: 28px;
    padding-top: 72px;
  }
  .feature-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  .brand {
    font-size: 1.04rem;
  }
}
@media (max-width: 640px) {
  .topbar-inner {
    min-height: 60px;
    flex-wrap: wrap;
  }
  .brand {
    font-size: 0.9rem;
    flex: 1 1 auto;
  }
  .nav {
    flex: 0 0 auto;
    gap: 8px;
  }
  .nav a {
    font-size: 0.85rem;
    display: none;
  }
  .lang-wrap {
    order: 1;
  }
  .hero {
    padding-top: 32px;
  }
  .section {
    padding: 40px 0 0;
  }
  .hero-meta {
    font-size: 0.88rem;
  }
  .chip {
    min-height: 64px;
    padding: 10px;
  }
  .chip b {
    font-size: 0.85rem;
  }
  .chip span {
    font-size: 0.78rem;
  }
}
@media (prefers-reduced-motion: reduce) {
  * {
    animation: none !important;
    transition: none !important;
    scroll-behavior: auto !important;
  }
  .reveal {
    opacity: 1;
    transform: none;
  }
}
html[dir="rtl"] .topbar-inner {
  flex-direction: row-reverse;
}
html[dir="rtl"] .lang-menu {
  left: 0;
  right: auto;
}
html[dir="rtl"] .lang-item {
  text-align: right;
}
html[dir="rtl"] .hero-meta li {
  padding-left: 0;
  padding-right: 18px;
}
html[dir="rtl"] .hero-meta li::before {
  left: auto;
  right: 0;
}
</style>
</head>
<body>
<header class="topbar">
  <div class="wrap topbar-inner">
    <a class="brand" href="#">FunHub Party - SayLove</a>
    <nav class="nav" aria-label="Primary">
      <a href="#features" id="navFeatures">Modes</a>
      <a href="#how" id="navHow">How It Works</a>
      <a href="#languages" id="navLanguages">Languages</a>
      <div class="lang-wrap">
        <button id="langButton" class="lang-btn" type="button"></button>
        <div id="langMenu" class="lang-menu"></div>
      </div>
    </nav>
  </div>
</header>
<main>
  <section class="wrap hero">
    <div class="reveal">
      <p class="eyebrow" id="heroEyebrow"></p>
      <h1 id="heroTitle"></h1>
      <p class="sub" id="heroSub"></p>
      <div class="cta-row">
        <a class="btn btn-primary" href="https://play.google.com/store/apps/details?id=com.saylove" target="_blank" rel="noopener noreferrer" id="ctaDownload"></a>
        <a class="btn btn-ghost" href="#features" id="ctaExplore"></a>
      </div>
      <ul class="hero-meta" id="heroMeta"></ul>
    </div>
    <aside class="hero-preview reveal delay-1" aria-label="Feature Preview" id="heroPreview"></aside>
  </section>
  <section id="features" class="wrap section">
    <h2 class="reveal" id="featuresTitle"></h2>
    <p class="lead reveal delay-1" id="featuresLead"></p>
    <div class="feature-grid" id="featureGrid"></div>
  </section>
  <section id="how" class="wrap section">
    <h2 class="reveal" id="howTitle"></h2>
    <p class="lead reveal delay-1" id="howLead"></p>
    <div class="steps" id="howSteps"></div>
  </section>
  <section id="languages" class="wrap section">
    <h2 class="reveal" id="languagesTitle"></h2>
    <p class="lead reveal delay-1" id="languagesLead"></p>
    <div class="lang-row reveal delay-2" id="languagesList"></div>
  </section>
  <section class="wrap">
    <div class="banner reveal">
      <h3 id="bannerTitle"></h3>
      <p id="bannerText"></p>
      <div class="cta-row">
        <a class="btn btn-primary" href="https://play.google.com/store/apps/details?id=com.saylove" target="_blank" rel="noopener noreferrer" id="bannerCta"></a>
      </div>
    </div>
  </section>
</main>
<footer>
  <div class="wrap" id="footerText"></div>
</footer>
<script>
var STORAGE_KEY = "funhub_language";
var LANGUAGE_OPTIONS = [
  { code: "en", name: "English" },
  { code: "zh", name: "简体中文" },
  { code: "zh-TW", name: "繁體中文" },
  { code: "hi", name: "हिंदी" },
  { code: "es", name: "Español" },
  { code: "fr", name: "Français" },

      { num: "Schritt 02", title: "Lade deine Freunde ein", desc: "Teile deinen Raumablauf mit nahen Freunden. Team-Spiele funktionieren am besten im selben lokalen Netzwerk." },
      { num: "Schritt 03", title: "Sofort spielen", desc: "Wechsle jederzeit den Modus, halte die Gruppe engagiert, führe eine komplette Party-Session von einer App aus." }
    ],
    languagesTitle: "Mehrsprachiges Design",
    languagesLead: "FunHub Party - SayLove unterstützt schnellen Sprachwechsel, sodass Freunde verschiedener Sprachen problemlos zusammen spielen können.",
    languages: ["Englisch", "Vereinfachtes Chinesisch", "Traditionelles Chinesisch", "Hindi", "Spanisch", "Französisch", "Arabisch", "Bengali", "Russisch", "Portugiesisch", "Urdu", "Indonesisch", "Deutsch", "Japanisch", "Koreanisch"],
    bannerTitle: "Bereit für die nächste Party?",
    bannerText: "Starte eine App, wähle einen Modus und halte deine Gruppe von der ersten Runde bis zum letzten Lachen verbunden.",
    bannerCta: "FunHub Party - SayLove herunterladen",
    footer: "© {year} FunHub Party - SayLove. Alle Rechte vorbehalten."
  }
};
function normalizeLang(lang) {
  var lower = (lang || "").toLowerCase().split("-")[0];
  if (lang && lang.toLowerCase().indexOf("zh-tw") === 0) return "zh-TW";
  if (lang && lang.toLowerCase().indexOf("zh-hk") === 0) return "zh-TW";
  return CODE_LOOKUP[lower] || "en";
}
function getLanguageName(code) {
  for (var i = 0; i < LANGUAGE_OPTIONS.length; i++) {
    if (LANGUAGE_OPTIONS[i].code === code) return LANGUAGE_OPTIONS[i].name;
  }
  return "English";
}
function saveLang(lang) {
  try {
    localStorage.setItem(STORAGE_KEY, lang);
  } catch (e) {}
}
function loadLang() {
  try {
    return localStorage.getItem(STORAGE_KEY);
  } catch (e) {
    return null;
  }
}
function getTranslation(lang) {
  var base = TRANSLATIONS[lang];
  if (!base) return TRANSLATIONS.en;
  if (!base.navFeatures) {
    var merged = {};
    for (var key in TRANSLATIONS.en) {
      if (TRANSLATIONS.en.hasOwnProperty(key)) {
        merged[key] = TRANSLATIONS.en[key];
      }
    }
    for (var key in base) {
      if (base.hasOwnProperty(key)) {
        merged[key] = base[key];
      }
    }
    return merged;
  }
  return base;
}
function renderLanguageMenu(activeLang) {
  var html = "";
  LANGUAGE_OPTIONS.forEach(function(item) {
    var activeClass = item.code === activeLang ? " active" : "";
    html += '<button type="button" class="lang-item' + activeClass + '" data-lang="' + item.code + '">' + item.name + '</button>';
  });
  document.getElementById("langMenu").innerHTML = html;
  var items = document.querySelectorAll(".lang-item");
  for (var i = 0; i < items.length; i++) {
    items[i].addEventListener("click", function() {
      switchLanguage(this.getAttribute("data-lang"));
      document.getElementById("langMenu").classList.remove("show");
    });
  }
}
function renderContent(lang) {
  var t = getTranslation(lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = RTL_LANGS[lang] ? "rtl" : "ltr";
  document.title = "FunHub Party - SayLove | Party Games in One App";
  document.getElementById("langButton").textContent = t.switchLanguage;
  renderLanguageMenu(lang);
  document.getElementById("navFeatures").textContent = t.navFeatures;
  document.getElementById("navHow").textContent = t.navHow;
  document.getElementById("navLanguages").textContent = t.navLanguages;
  document.getElementById("heroEyebrow").textContent = t.heroEyebrow;
  document.getElementById("heroTitle").textContent = t.heroTitle;
  document.getElementById("heroSub").textContent = t.heroSub;
  document.getElementById("ctaDownload").textContent = t.ctaDownload;
  document.getElementById("ctaExplore").textContent = t.ctaExplore;
  var metaHtml = "";
  t.heroMeta.forEach(function(item) {
    metaHtml += "<li>" + item + "</li>";
  });
  document.getElementById("heroMeta").innerHTML = metaHtml;
  var previewHtml = "";
  if (t.preview.length >= 5) {
    previewHtml += '<div class="preview-row">';
    previewHtml += '<div class="chip"><b>' + t.preview[0].title + '</b><span>' + t.preview[0].desc + '</span></div>';
    previewHtml += '<div class="chip"><b>' + t.preview[1].title + '</b><span>' + t.preview[1].desc + '</span></div>';
    previewHtml += '</div><div class="preview-row">';
    previewHtml += '<div class="chip"><b>' + t.preview[2].title + '</b><span>' + t.preview[2].desc + '</span></div>';
    previewHtml += '<div class="chip"><b>' + t.preview[3].title + '</b><span>' + t.preview[3].desc + '</span></div>';
    previewHtml += '</div><div class="chip"><b>' + t.preview[4].title + '</b><span>' + t.preview[4].desc + '</span></div>';
  }
  document.getElementById("heroPreview").innerHTML = previewHtml;
  document.getElementById("featuresTitle").textContent = t.featuresTitle;
  document.getElementById("featuresLead").textContent = t.featuresLead;
  var featuresHtml = "";
  t.features.forEach(function(f, idx) {
    var delayClass = idx % 3 === 1 ? " delay-1" : (idx % 3 === 2 ? " delay-2" : "");
    featuresHtml += '<article class="card reveal' + delayClass + '">';
    featuresHtml += '<span class="tag">' + f.tag + '</span>';
    featuresHtml += '<h3>' + f.title + '</h3>';
    featuresHtml += '<p>' + f.desc + '</p>';
    featuresHtml += '</article>';
  });
  document.getElementById("featureGrid").innerHTML = featuresHtml;
  document.getElementById("howTitle").textContent = t.howTitle;
  document.getElementById("howLead").textContent = t.howLead;
  var stepsHtml = "";
  t.howSteps.forEach(function(s, idx) {
    var delayClass = idx === 1 ? " delay-1" : (idx === 2 ? " delay-2" : "");
    stepsHtml += '<article class="step reveal' + delayClass + '">';
    stepsHtml += '<span class="step-num">' + s.num + '</span>';
    stepsHtml += '<h4>' + s.title + '</h4>';
    stepsHtml += '<p>' + s.desc + '</p>';
    stepsHtml += '</article>';
  });
  document.getElementById("howSteps").innerHTML = stepsHtml;
  document.getElementById("languagesTitle").textContent = t.languagesTitle;
  document.getElementById("languagesLead").textContent = t.languagesLead;
  var langsHtml = "";
  t.languages.forEach(function(l) {
    langsHtml += '<span class="pill">' + l + '</span>';
  });
  document.getElementById("languagesList").innerHTML = langsHtml;
  document.getElementById("bannerTitle").textContent = t.bannerTitle;
  document.getElementById("bannerText").textContent = t.bannerText;
  document.getElementById("bannerCta").textContent = t.bannerCta;
  document.getElementById("footerText").textContent = t.footer.replace("{year}", new Date().getFullYear());
  setTimeout(function() {
    var nodes = document.querySelectorAll(".reveal");
    if ("IntersectionObserver" in window) {
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("show");
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.14 });
      nodes.forEach(function(el) { io.observe(el); });
    } else {
      nodes.forEach(function(el) { el.classList.add("show"); });
    }
  }, 50);
}
function switchLanguage(lang) {
  var normalized = normalizeLang(lang);
  saveLang(normalized);
  renderContent(normalized);
}
document.getElementById("langButton").addEventListener("click", function(event) {
  event.stopPropagation();
  document.getElementById("langMenu").classList.toggle("show");
});
document.addEventListener("click", function() {
  document.getElementById("langMenu").classList.remove("show");
});
(function() {
  var params = new URLSearchParams(window.location.search);
  var queryLang = params.get("lang");
  var storedLang = loadLang();
  var browserLang = navigator.language || navigator.userLanguage || "en";
  var initialLang = normalizeLang(queryLang || storedLang || browserLang);
  if (queryLang) {
    saveLang(initialLang);
  }
  switchLanguage(initialLang);
})();
</script>
</body>
</html>
